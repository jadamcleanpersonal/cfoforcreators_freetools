name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm biome check --diagnostic-level=error .

      - name: Typecheck
        run: pnpm tsc --noEmit

      - name: Unit tests
        run: pnpm vitest run --coverage

      # Build is verified by Vercel's preview deployment (gates merges via the Vercel check).
      # No need to duplicate the build here AND maintain 11 GitHub secrets in sync with Vercel.

  e2e:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm playwright install --with-deps chromium webkit

      - name: Run E2E tests
        run: pnpm playwright test
        env:
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
